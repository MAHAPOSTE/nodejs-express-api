<!DOCTYPE html>
<html>
    <head>
        <title>Courses UI</title>
    </head>
    <body>
        <h2>Listing Courses - <span id="count">0</span></h2> 
        <button onclick="handleClick()">fetch courses</button>
        <ul id="list"></ul>
        <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
        <script>
            const ulTag = document.getElementById('list');
            const countHandle = document.getElementById("count"); 
            function handleClick() {
            axios.get("http://localhost:4000/courses")
              .then((response) => {
                   const courses = response.data
                   ulTag.innerHTML = "";
                    countHandle.textContent = courses.length;
                    for(let course of courses) {
                        const liTag = document.createElement('li');  
                        liTag.textContent = course.title;   
                        ulTag.appendChild(liTag);  // data is property to get data
              }
            })
              .catch((err) => {
                   console.log(err);
              })
